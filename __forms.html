<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Forms</title>
</head>
<body>
<!-- Static form so Netlify detects the lead store at build/deploy time.
     The live landing page submits the same field names via fetch() to "/". -->
<form name="lead-intandem" data-netlify="true" netlify-honeypot="company" hidden>
  <input type="text" name="name" />
  <input type="tel" name="phone" />
  <input type="email" name="email" />
  <input type="text" name="destination" />
  <input type="text" name="intake" />
  <input type="text" name="study_level" />
  <textarea name="message"></textarea>
  <input type="text" name="company" />
</form>
</body>
</html>
